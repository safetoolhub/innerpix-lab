name: Protect MVP1 branch

on:
  workflow_dispatch: {}
  push:
    branches:
      - 'MVP1'

permissions:
  administration: write

jobs:
  protect:
    runs-on: ubuntu-latest
    name: Apply branch protection to MVP1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Protect MVP1 branch via GitHub API
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'MVP1';

            core.info(`Applying branch protection for ${owner}/${repo} branch ${branch}`);

            await github.repos.updateBranchProtection({
              owner,
              repo,
              branch,
              required_status_checks: {
                strict: true,
                contexts: []
              },
              enforce_admins: true,
              required_pull_request_reviews: {
                dismiss_stale_reviews: true,
                require_code_owner_reviews: false,
                required_approving_review_count: 1
              },
              restrictions: null,
              allow_deletions: false,
              allow_force_pushes: false
            });

      - name: Confirm
        run: |
          echo "Branch protection request submitted for MVP1. If the workflow ran with sufficient permissions, the branch is now protected against deletions and force-pushes."
